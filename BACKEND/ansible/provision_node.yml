---
- name: Provision WireGuard VPN Node
  hosts: vpn_nodes
  become: yes
  vars:
    wireguard_port: 51820
    internal_network: 10.0.0.1/24

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install WireGuard and dependencies
      apt:
        name:
          - wireguard
          - ufw
          - qrencode
        state: present

    - name: Enable IP Forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Generate Server Private Key
      shell: wg genkey
      register: server_private_key_raw

    - name: Generate Server Public Key
      shell: echo "{{ server_private_key_raw.stdout }}" | wg pubkey
      register: server_public_key_raw

    - name: Create WireGuard configuration
      template:
        src: wg0.conf.j2
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: '0600'

    - name: Configure UFW for WireGuard
      ufw:
        rule: allow
        port: "{{ wireguard_port }}"
        proto: udp

    - name: Configure UFW for SSH
      ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Start and enable WireGuard
      systemd:
        name: wg-quick@wg0
        state: started
        enabled: yes

    - name: Output Server Public Key
      debug:
        msg: "Server Public Key: {{ server_public_key_raw.stdout }}"
